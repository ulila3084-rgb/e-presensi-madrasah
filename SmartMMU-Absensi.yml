name: Build Android APK Only

on:
  push:
    branches: [ "utama", "main" ]
  pull_request:
    branches: [ "utama", "main" ]

jobs:
  membangun-android:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Jalankan Build Android Otomatis
      run: |
        echo "=== MEMULAI PROSES BUILD APK ==="
        
        # 1. JIKA PROYEK FLUTTER
        FLUTTER_PATH=$(find . -name pubspec.yaml -print -quit)
        if [ ! -z "$FLUTTER_PATH" ]; then
          echo "=> Terdeteksi proyek Flutter."
          git clone https://github.com/flutter/flutter.git -b stable $HOME/flutter
          export PATH="$PATH:$HOME/flutter/bin"
          cd $(dirname "$FLUTTER_PATH")
          flutter pub get
          flutter build apk --release
          exit 0
        fi

        # 2. JIKA PROYEK NODE.JS (React Native / Ionic / Cordova)
        PACKAGE_PATH=$(find . -name package.json -not -path '*/node_modules/*' -print -quit)
        if [ ! -z "$PACKAGE_PATH" ]; then
          echo "=> Terdeteksi proyek berbasis Node.js."
          cd $(dirname "$PACKAGE_PATH")
          npm install --legacy-peer-deps
          
          ANDROID_DIR=$(find . -name gradlew -print -quit)
          if [ ! -z "$ANDROID_DIR" ]; then
            cd $(dirname "$ANDROID_DIR")
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            npx react-native build-android --mode=release || npm run build || echo "Selesai"
          fi
          exit 0
        fi

        # 3. JIKA PROYEK ANDROID NATIVE (Java / Kotlin)
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        if [ ! -z "$GRADLEW_PATH" ]; then
          echo "=> Terdeteksi proyek Android Native."
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          ./gradlew assembleRelease
          exit 0
        fi

        echo "ERROR: File tanda proyek tidak ditemukan!"
        exit 1

    - name: Amankan Hasil APK Secara Agresif
      uses: actions/upload-artifact@v4
      with:
        name: MUDM-Presensimobile-APK
        path: |
          **/*.apk
