name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main # Atau nama branch utama Anda (misal: master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dari repositori GitHub Anda
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. Setup Node.js (Hanya digunakan untuk menjalankan CLASP, bukan project Anda)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # JANGAN gunakan baris cache: 'npm' di sini karena tidak ada package-lock.json

      # 3. Menginstal CLASP (Alat resmi Google untuk push kode ke Apps Script)
      - name: Install Clasp
        run: npm install -g @google/clasp

      # 4. Membuat file kredensial login Clasp secara otomatis
      - name: Create clasprc.json
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      # 5. Push kode code.gs dan index.html Anda ke Google Drive / Apps Script
      - name: Push code to Apps Script
        run: clasp push -f
