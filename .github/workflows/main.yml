name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main  # Workflow jalan setiap kali kamu push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '20'

    # 3. Install Clasp
    - name: Install Clasp
      run: npm install -g @google/clasp

    # 4. Konfigurasi Kredensial Google dari GitHub Secrets
    - name: Create clasprc.json
      run: |
        echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

    # 5. Push Kode ke Google Apps Script
    - name: Push to Apps Script
      run: clasp push -f
